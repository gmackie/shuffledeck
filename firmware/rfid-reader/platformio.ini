; ShuffleDeck RFID Reader - Prototype Firmware
; Single RC522 reader on ESP32 DevKit

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    miguelbalboa/MFRC522@^1.4.10
    links2004/WebSockets@^2.4.1
build_flags =
    -D CORE_DEBUG_LEVEL=3
